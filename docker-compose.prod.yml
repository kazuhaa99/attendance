services:
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file: .env.prod
    expose:
      - "8000"
    dns:
      - 10.8.26.4
    volumes:
      - backend_data:/app/data
      - ./certs:/app/certs:ro

  frontend:
    build:
      context: ./frontend
      target: production
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:80"
    depends_on:
      - backend

volumes:
  backend_data:
