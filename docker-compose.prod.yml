services:
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file: .env.prod
    expose:
      - "8000"
    volumes:
      - backend_data:/app/data

  frontend:
    build:
      context: ./frontend
      target: production      # multi-stage: build → nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  backend_data:
